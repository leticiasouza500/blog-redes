<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>BlogTech — Navbar</title>

    <meta
      name="description"
      content="Blog educacional da turma de Redes 3 - IFCE"
    />
    <meta name="author" content="Letícia, Moisés" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="site-header">
      <nav class="nav-inner" aria-label="Navegação principal">
        <!-- Logo -->
        <a href="#" class="nav-logo" aria-label="Página inicial do BlogTech">
          BlogTech
        </a>

        <!-- Links -->
        <ul class="nav-links">
          <li><a href="#">Início</a></li>
          <li><a href="#">Artigos</a></li>
          <li><a href="#">Sobre</a></li>
        </ul>

        <!-- Ações -->
        <div class="nav-actions">
          <a href="#" class="btn-entrar" aria-label="Entrar na conta">
            Entrar
          </a>

          <button class="btn-search" aria-label="Pesquisar no site">
            <span class="material-symbols-outlined" aria-hidden="true">
              search
            </span>
          </button>
        </div>
        <button class="btn-hamburger">
          <span class="material-symbols-outlined">menu</span>
        </button>
      </nav>
    </header>

  <script>
      let menu = document.querySelector(".btn-hamburger");
      let nav = document.querySelector(".nav-inner");

      menu.addEventListener("click", () => {
       nav.classList.toggle("open");
      });

    </script>

  </body>
</html>
